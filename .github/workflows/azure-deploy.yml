name: Deploy To Azure App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  IMAGE_TAG: ${{ github.sha }}
  IMAGE_NAME: ${{ vars.AZURE_IMAGE_NAME || 'loadlog-api' }}
  REGISTRY_LOGIN_SERVER: ${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build app
        run: npm run build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push container image
        run: |
          docker build -t $REGISTRY_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG .
          docker push $REGISTRY_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG

      - name: Configure App Service container image
        run: |
          az webapp config container set \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEBAPP_NAME" \
            --container-image-name "$REGISTRY_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG" \
            --container-registry-url "https://$REGISTRY_LOGIN_SERVER" \
            --container-registry-user "${{ secrets.AZURE_REGISTRY_USERNAME }}" \
            --container-registry-password "${{ secrets.AZURE_REGISTRY_PASSWORD }}"

      - name: Set App Service environment variables
        run: |
          az webapp config appsettings set \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEBAPP_NAME" \
            --settings \
              NODE_ENV=production \
              PORT=3000 \
              WEBSITES_PORT=3000 \
              SUPABASE_URL='${{ secrets.SUPABASE_URL }}' \
              SUPABASE_ANON_KEY='${{ secrets.SUPABASE_ANON_KEY }}' \
              JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              JWT_EXPIRES_IN='${{ secrets.JWT_EXPIRES_IN }}' \
              GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}' \
              GEMINI_MODEL='${{ secrets.GEMINI_MODEL }}'

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEBAPP_NAME"
