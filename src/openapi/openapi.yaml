openapi: 3.1.0
info:
  title: LiftLog API
  version: 1.0.0

servers:
  - url: /
    description: Same-origin (Swagger UI served from this API)
  - url: https://loadlog-api.onrender.com
    description: Render production
  - url: http://localhost:3000
    description: Local development (localhost)
  - url: http://127.0.0.1:3000
    description: Local development (loopback)

paths:
  /workout-plans:
    get:
      operationId: listWorkoutPlans
      responses:
        '200':
          description: List of workout plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutPlan'

    post:
      operationId: createWorkoutPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutPlanInput'
      responses:
        '201':
          description: Created workout plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutPlan'

  /workout-plans/{planId}:
    get:
      operationId: getWorkoutPlanById
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Single workout plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutPlan'

    put:
      operationId: updateWorkoutPlan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutPlanInput'
      responses:
        '200':
          description: Updated workout plan

    delete:
      operationId: deleteWorkoutPlan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted workout plan

  /exercises/{exerciseName}/history:
    get:
      operationId: getExerciseHistory
      parameters:
        - name: exerciseName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Exercise history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseHistoryResponse'

  /workout-sessions:
    get:
      operationId: listWorkoutSessions
      responses:
        '200':
          description: List of workout sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutSession'

    post:
      operationId: createWorkoutSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutSessionInput'
      responses:
        '201':
          description: Created workout session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutSession'

  /workout-sessions/{sessionId}:
    get:
      operationId: getWorkoutSessionById
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Single workout session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutSession'
                
  
components:
  schemas:

    WorkoutPlan:
      type: object
      required:
        - id
        - name
        - exercises
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/PlanExercise'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlanExercise:
      type: object
      required:
        - id
        - exerciseName
        - order
        - sets
      properties:
        id:
          type: string
        exerciseName:
          type: string
        order:
          type: integer
        sets:
          type: array
          items:
            $ref: '#/components/schemas/PlanSet'

    PlanSet:
      type: object
      required:
        - setNumber
        - targetReps
        - targetWeight
      properties:
        setNumber:
          type: integer
        targetReps:
          type: integer
        targetWeight:
          type: number

    
    CreateWorkoutPlanInput:
      type: object
      required:
        - name
        - exercises
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        exercises:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreatePlanExerciseInput'
    
    CreatePlanExerciseInput:
      type: object
      required:
        - exerciseName
        - order
        - sets
      properties:
        exerciseName:
          type: string
          minLength: 1
        order:
          type: integer
          minimum: 1
        sets:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreatePlanSetInput'
    
    CreatePlanSetInput:
      type: object
      required:
        - setNumber
        - targetReps
        - targetWeight
      properties:
        setNumber:
          type: integer
          minimum: 1
        targetReps:
          type: integer
          minimum: 1
        targetWeight:
          type: number
          minimum: 0

    ExerciseHistoryResponse:
      type: object
      required:
        - exerciseName
        - history
      properties:
        exerciseName:
          type: string
        history:
          type: array
          items:
            $ref: '#/components/schemas/HistoryItem'

    HistoryItem:
      type: object
      required:
        - performedAt
        - sets
      properties:
        performedAt:
          type: string
          format: date-time
        sets:
          type: array
          items:
            $ref: '#/components/schemas/HistorySet'

    HistorySet:
      type: object
      required:
        - setNumber
        - actualReps
        - actualWeight
      properties:
        setNumber:
          type: integer
        actualReps:
          type: integer
        actualWeight:
          type: number

    WorkoutSession:
      type: object
      required:
        - id
        - planId
        - performedAt
        - exercises
      properties:
        id:
          type: string
        planId:
          type: string
        performedAt:
          type: string
          format: date-time
        notes:
          type: string
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/SessionExercise'

    SessionExercise:
      type: object
      required:
        - exerciseName
        - sets
      properties:
        exerciseName:
          type: string
        sets:
          type: array
          items:
            $ref: '#/components/schemas/SessionSet'

    SessionSet:
      type: object
      required:
        - setNumber
        - actualReps
        - actualWeight
      properties:
        setNumber:
          type: integer
          minimum: 1
        actualReps:
          type: integer
          minimum: 0
        actualWeight:
          type: number
          minimum: 0

    CreateWorkoutSessionInput:
      type: object
      required:
        - planId
        - exercises
      properties:
        planId:
          type: string
        performedAt:
          type: string
          format: date-time
        notes:
          type: string
        exercises:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateSessionExerciseInput'

    CreateSessionExerciseInput:
      type: object
      required:
        - exerciseName
        - sets
      properties:
        exerciseName:
          type: string
          minLength: 1
        sets:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateSessionSetInput'

    CreateSessionSetInput:
      type: object
      required:
        - setNumber
        - actualReps
        - actualWeight
      properties:
        setNumber:
          type: integer
          minimum: 1
        actualReps:
          type: integer
          minimum: 0
        actualWeight:
          type: number
          minimum: 0
