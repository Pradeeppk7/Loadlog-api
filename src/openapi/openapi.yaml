openapi: 3.1.0
info:
  title: LiftLog API
  version: 1.0.0
  description: |
    Protected endpoints require a JWT bearer token.
    First call `/auth/login` or `/auth/register`, copy the returned token,
    then click the Swagger `Authorize` button and paste `Bearer <token>`.

servers:
  - url: /
    description: Same-origin (Swagger UI served from this API)
  - url: https://loadlog-api.onrender.com/
    description: Render production
  - url: http://localhost:3000
    description: Local development (localhost)
  - url: http://127.0.0.1:3000
    description: Local development (loopback)

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserInput'
      responses:
        '201':
          description: Registered user and token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/login:
    post:
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Authenticated user and token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/me:
    get:
      operationId: me
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createUser
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserInput'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}:
    get:
      operationId: getUserById
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Single user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserInput'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}/workout-plans:
    get:
      operationId: listUserWorkoutPlans
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Paginated list of a user's workout plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWorkoutPlansResponse'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}/workout-sessions:
    get:
      operationId: listUserWorkoutSessions
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Paginated list of a user's workout sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWorkoutSessionsResponse'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /workout-plans:
    get:
      operationId: listWorkoutPlans
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Paginated list of workout plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWorkoutPlansResponse'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      operationId: createWorkoutPlan
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutPlanInput'
      responses:
        '201':
          description: Created workout plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutPlan'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /workout-plans/{planId}:
    get:
      operationId: getWorkoutPlanById
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - name: planId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Single workout plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutPlan'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      operationId: updateWorkoutPlan
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - name: planId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutPlanInput'
      responses:
        '200':
          description: Updated workout plan
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      operationId: deleteWorkoutPlan
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - name: planId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted workout plan
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /exercises/{exerciseName}/history:
    get:
      operationId: getExerciseHistory
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - name: exerciseName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Exercise history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseHistoryResponse'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /workout-sessions:
    get:
      operationId: listWorkoutSessions
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Paginated list of workout sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWorkoutSessionsResponse'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      operationId: createWorkoutSession
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkoutSessionInput'
      responses:
        '201':
          description: Created workout session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutSession'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /workout-sessions/{sessionId}:
    get:
      operationId: getWorkoutSessionById
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Single workout session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutSession'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ai/coach-chat:
    post:
      operationId: coachChat
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoachChatRequest'
      responses:
        '200':
          description: Coach chatbot response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachChatResponse'
        '401':
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                
  
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Paste your JWT as `Bearer <token>`.
  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      required: false
      description: JWT bearer token in the format `Bearer <token>`.
      schema:
        type: string
      example: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature
  schemas:
    PaginationMetadata:
      type: object
      required:
        - page
        - pageSize
        - totalItems
        - totalPages
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    PaginatedWorkoutPlansResponse:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutPlan'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    PaginatedWorkoutSessionsResponse:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutSession'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    WorkoutPlan:
      type: object
      required:
        - id
        - name
        - exercises
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        userId:
          type: string
        description:
          type: string
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/PlanExercise'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlanExercise:
      type: object
      required:
        - id
        - exerciseName
        - order
        - sets
      properties:
        id:
          type: string
        exerciseName:
          type: string
        order:
          type: integer
        sets:
          type: array
          items:
            $ref: '#/components/schemas/PlanSet'

    PlanSet:
      type: object
      required:
        - setNumber
        - targetReps
        - targetWeight
      properties:
        setNumber:
          type: integer
        targetReps:
          type: integer
        targetWeight:
          type: number

    
    CreateWorkoutPlanInput:
      type: object
      required:
        - name
        - exercises
      properties:
        name:
          type: string
          minLength: 1
        userId:
          type: string
        description:
          type: string
        exercises:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreatePlanExerciseInput'
    
    CreatePlanExerciseInput:
      type: object
      required:
        - exerciseName
        - order
        - sets
      properties:
        exerciseName:
          type: string
          minLength: 1
        order:
          type: integer
          minimum: 1
        sets:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreatePlanSetInput'
    
    CreatePlanSetInput:
      type: object
      required:
        - setNumber
        - targetReps
        - targetWeight
      properties:
        setNumber:
          type: integer
          minimum: 1
        targetReps:
          type: integer
          minimum: 1
        targetWeight:
          type: number
          minimum: 0

    ExerciseHistoryResponse:
      type: object
      required:
        - exerciseName
        - history
      properties:
        exerciseName:
          type: string
        history:
          type: array
          items:
            $ref: '#/components/schemas/HistoryItem'

    HistoryItem:
      type: object
      required:
        - performedAt
        - sets
      properties:
        performedAt:
          type: string
          format: date-time
        sets:
          type: array
          items:
            $ref: '#/components/schemas/HistorySet'

    HistorySet:
      type: object
      required:
        - setNumber
        - actualReps
        - actualWeight
      properties:
        setNumber:
          type: integer
        actualReps:
          type: integer
        actualWeight:
          type: number

    WorkoutSession:
      type: object
      required:
        - id
        - planId
        - performedAt
        - exercises
      properties:
        id:
          type: string
        userId:
          type: string
        planId:
          type: string
        performedAt:
          type: string
          format: date-time
        notes:
          type: string
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/SessionExercise'

    SessionExercise:
      type: object
      required:
        - exerciseName
        - sets
      properties:
        exerciseName:
          type: string
        sets:
          type: array
          items:
            $ref: '#/components/schemas/SessionSet'

    SessionSet:
      type: object
      required:
        - setNumber
        - actualReps
        - actualWeight
      properties:
        setNumber:
          type: integer
          minimum: 1
        actualReps:
          type: integer
          minimum: 0
        actualWeight:
          type: number
          minimum: 0

    CreateWorkoutSessionInput:
      type: object
      required:
        - planId
        - exercises
      properties:
        planId:
          type: string
        userId:
          type: string
        performedAt:
          type: string
          format: date-time
        notes:
          type: string
        exercises:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateSessionExerciseInput'

    CreateSessionExerciseInput:
      type: object
      required:
        - exerciseName
        - sets
      properties:
        exerciseName:
          type: string
          minLength: 1
        sets:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateSessionSetInput'

    CreateSessionSetInput:
      type: object
      required:
        - setNumber
        - actualReps
        - actualWeight
      properties:
        setNumber:
          type: integer
          minimum: 1
        actualReps:
          type: integer
          minimum: 0
        actualWeight:
          type: number
          minimum: 0

    CoachChatRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
        userId:
          type: string
        history:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/CoachChatMessage'
        profile:
          $ref: '#/components/schemas/CoachProfile'

    CoachChatMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          minLength: 1

    CoachProfile:
      type: object
      properties:
        goal:
          type: string
        dietaryPreferences:
          type: string
        injuriesOrLimitations:
          type: string
        experienceLevel:
          type: string
          enum: [beginner, intermediate, advanced]

    User:
      type: object
      required:
        - id
        - name
        - email
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        age:
          type: integer
        coachProfile:
          $ref: '#/components/schemas/CoachProfile'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateUserInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        age:
          type: integer
          minimum: 13
        coachProfile:
          $ref: '#/components/schemas/CoachProfile'

    RegisterUserInput:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        age:
          type: integer
          minimum: 13
        coachProfile:
          $ref: '#/components/schemas/CoachProfile'

    UpdateUserInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        age:
          type: integer
          minimum: 13
        coachProfile:
          $ref: '#/components/schemas/CoachProfile'

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      required:
        - user
        - token
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        details:
          oneOf:
            - type: string
            - type: array
              items: {}

    CoachChatResponse:
      type: object
      required:
        - reply
        - model
      properties:
        reply:
          type: string
        model:
          type: string
